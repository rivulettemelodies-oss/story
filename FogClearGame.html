<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fog Clear - Cognitive Paradox</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            font-family: 'Courier New', Courier, monospace;
            background-color: #050510;
            color: #fff;
            user-select: none;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
            margin-bottom: 5px;
        }

        p.instructions {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 30px;
            text-align: center;
        }

        /* 迷雾照片区域 */
        #photo-area {
            position: relative;
            display: inline-block; /* 让容器高度跟随内部 img 自动撑开 */
            max-width: 860px;
            width: 100%;
            border: 2px solid #333;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        #photo-area img {
            display: block;
            width: 100%;
            height: auto; /* 浏览器原生等比缩放，绝对不变形 */
        }

        /* 迷雾遮罩层：position absolute 叠在 img 上方 */
        .fog-section {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(20, 20, 30, 0.5);
            backdrop-filter: blur(8px);
            transition: opacity 1.5s ease;
            z-index: 10;
            pointer-events: none;
        }

        .fog-section.cleared {
            opacity: 0;
        }

        /* 每层只负责画面的一块（使用蒙版羽化边缘，形成不规则的柔和雾气分布） */
        /* 黑色的部分代表迷雾存在的地方，透明代表没有这层迷雾 */
        #fog-frag4 { -webkit-mask-image: radial-gradient(ellipse at 25% 25%, black 20%, transparent 65%); mask-image: radial-gradient(ellipse at 25% 25%, black 20%, transparent 65%); } /* 左上 VIPER */
        #fog-frag2 { -webkit-mask-image: radial-gradient(ellipse at 85% 35%, black 20%, transparent 65%); mask-image: radial-gradient(ellipse at 85% 35%, black 20%, transparent 65%); } /* 右上 照相区 */
        #fog-frag1 { -webkit-mask-image: radial-gradient(ellipse at 30% 80%, black 20%, transparent 65%); mask-image: radial-gradient(ellipse at 30% 80%, black 20%, transparent 65%); } /* 左下 酒杯区 */
        #fog-frag3 { -webkit-mask-image: radial-gradient(ellipse at 75% 80%, black 20%, transparent 65%); mask-image: radial-gradient(ellipse at 75% 80%, black 20%, transparent 65%); } /* 右下 红泥区 */

        /* 放置热区 (Drop Zones) */
        .drop-zone {
            position: absolute;
            width: 140px;
            height: 140px;
            /* 去掉所有border */
            border: none;
            /* 去掉border-radius确保不会截断光晕 */
            border-radius: 0;
            transform: translate(-50%, -50%);
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            /* 不要用 pointer-events: none; 否则 drop 事件不会触发 */
        }

        .drop-zone.highlight {
            background: transparent;
            box-shadow: none;
            border: none;
        }

        .drop-zone.highlight::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, rgba(0, 255, 204, 0.4) 10%, transparent 60%);
            filter: blur(25px); /* 拖拽上去时的青色模糊发光 */
            border-radius: 50%;
            pointer-events: none;
            z-index: 20;
            animation: highlightPulse 1s infinite alternate;
            mix-blend-mode: screen;
        }

        @keyframes highlightPulse {
            from { opacity: 0.5; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
        }

        .drop-zone.hint {
            background: transparent;
            border: none;
            box-shadow: none;
            z-index: 20; /* 提升层级，显示在迷雾上方 */
        }

        .drop-zone.hint::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, rgba(255, 230, 150, 0.6) 10%, transparent 60%);
            filter: blur(30px); /* 纯模糊光晕，无形状边界 */
            border-radius: 50%;
            animation: hintPulse 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
            pointer-events: none;
            mix-blend-mode: screen; /* 唯美发光融合效果 */
        }

        @keyframes hintPulse {
            from { opacity: 0.3; transform: translate(-50%, -50%) scale(0.8); }
            to { opacity: 0.9; transform: translate(-50%, -50%) scale(1.4); }
        }

        .drop-zone.cleared {
            border: none; /* 去除边框 */
            z-index: 15; /* 突破迷雾显示 */
            box-shadow: none; /* 去除绿框高亮 */
            /* 背景图将在 JS 中动态计算偏移量来对齐 */
        }

        /* 区域位置（根据参考图红框精准定位） */
        #zone-drink { top: 75%; left: 56%; }   /* 酒杯：下方偏右玻璃杯 */
        #zone-mirror { top: 43%; left: 95%; }  /* 反光：最右侧举手机的女人 */
        #zone-mud { top: 56%; left: 74%; }      /* 红泥：中间偏右的长条形积水/泥印区域 */
        #zone-viper { top: 20%; left: 30%; }   /* 刺青：左上角蛇海报 */

        /* 底部线索栏 */
        #clues-container {
            display: flex;
            gap: 30px;
            margin-top: 40px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            border: 1px solid #333;
        }

        .clue-item {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #555;
            border-radius: 10px;
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .clue-item:hover {
            border-color: #00ffcc;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 255, 204, 0.2);
        }

        .clue-item:active {
            cursor: grabbing;
        }

        .clue-item.used {
            opacity: 0.2;
            pointer-events: none;
            filter: grayscale(100%);
        }

        /* 视频/剧情模态框 */
        #video-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s;
        }

        #video-modal.active {
            display: flex;
            opacity: 1;
        }

        .video-screen {
            width: 800px;
            height: 450px;
            background: #000;
            border: 1px solid #333;
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .video-placeholder-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.2);
            font-size: 24px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .dialogue-box {
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 40px 30px 20px;
            min-height: 100px;
        }

        .dialogue-line {
            margin-bottom: 10px;
            font-size: 18px;
            line-height: 1.5;
            display: none;
        }

        .dialogue-line.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        .speaker-arthur { color: #00ffcc; font-weight: bold; }
        .speaker-chloe { color: #ff3366; font-weight: bold; }
        .action-text { color: #888; font-style: italic; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn {
            padding: 12px 30px;
            font-size: 18px;
            background: transparent;
            color: #00ffcc;
            border: 2px solid #00ffcc;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            border-radius: 4px;
        }

        .btn:hover {
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 20px #00ffcc;
        }

        .btn.pulse {
            animation: btnPulse 2s infinite alternate;
        }

        @keyframes btnPulse {
            from { box-shadow: 0 0 10px rgba(0, 255, 204, 0.5); }
            to { box-shadow: 0 0 30px rgba(0, 255, 204, 1); }
        }

        /* 结局模态框 */
        #end-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .end-content {
            max-width: 600px;
            text-align: center;
            line-height: 1.8;
            font-size: 20px;
            color: #ddd;
        }

        .end-content span.highlight-arthur { color: #00ffcc; }
        .end-content span.highlight-chloe { color: #ff3366; }

    </style>
</head>
<body>

<div id="game-container">
    <h1>Memory Reconstruction</h1>
    <p class="instructions">Drag the gathered clues to their corresponding locations on the photo to clear the fog and reveal the truth.</p>

    <!-- 迷雾照片区域 -->
    <div id="photo-area">
        <!-- 用 img 标签让浏览器原生等比缩放，彻底杜绝变形 -->
        <img src="20260427-151538.jpeg" alt="scene" draggable="false">
        
        <!-- 拆分后的 4 块迷雾 -->
        <div class="fog-section" id="fog-frag4" data-id="frag4"></div>
        <div class="fog-section" id="fog-frag2" data-id="frag2"></div>
        <div class="fog-section" id="fog-frag1" data-id="frag1"></div>
        <div class="fog-section" id="fog-frag3" data-id="frag3"></div>
        
        <!-- 热区 -->
        <div class="drop-zone" id="zone-drink" data-target="frag1" data-fog="fog-frag1"></div>
        <div class="drop-zone" id="zone-mirror" data-target="frag2" data-fog="fog-frag2"></div>
        <div class="drop-zone" id="zone-mud" data-target="frag3" data-fog="fog-frag3"></div>
        <div class="drop-zone" id="zone-viper" data-target="frag4" data-fog="fog-frag4"></div>
    </div>

    <!-- 底部线索 -->
    <div id="clues-container">
        <div class="clue-item" draggable="true" id="frag1" data-id="frag1">🍷</div>
        <div class="clue-item" draggable="true" id="frag2" data-id="frag2">📸</div>
        <div class="clue-item" draggable="true" id="frag3" data-id="frag3">👠</div>
        <div class="clue-item" draggable="true" id="frag4" data-id="frag4">🐍</div>
    </div>

    <!-- 碎片叙事文案区域（移至 video modal 内部） -->
    <button class="btn pulse" id="continue-story-btn" style="display:none; margin-top: 30px;" onclick="returnToMainStory()">Continue to Main Story</button>
</div>

<!-- 视频剧情弹出层 -->
<div id="video-modal">
    <div class="video-screen">
        <div class="video-placeholder-text">[ MEMORY PLAYBACK ]</div>
        <div class="dialogue-box" id="dialogue-box">
            <!-- 动态注入台词 -->
        </div>
    </div>
    <!-- 叙事文案区：视频下方，按钮上方 -->
    <div id="clue-narrative" style="width: 800px; padding: 20px 30px; font-size: 15px; line-height: 1.9; color: #bbb; letter-spacing: 0.5px; font-style: italic; opacity: 0; transition: opacity 1s ease; text-align: left; border-left: 2px solid rgba(0,255,204,0.3); margin-bottom: 20px; background: rgba(0,0,0,0.4);"></div>
    <button class="btn" id="next-dialogue-btn" onclick="advanceDialogue()">Close & Return</button>
</div>

<script>
    let clearedCount = 0;
    const totalClues = 4;

    // 拖拽逻辑
    const clues = document.querySelectorAll('.clue-item');
    const dropZones = document.querySelectorAll('.drop-zone');
    let draggedItem = null;

    clues.forEach(clue => {
        clue.addEventListener('dragstart', function(e) {
            draggedItem = this;
            setTimeout(() => this.style.opacity = '0.5', 0);
            
            // 提示对应的目标位置
            const targetId = this.getAttribute('data-id');
            const targetZone = document.querySelector('.drop-zone[data-target="' + targetId + '"]');
            if (targetZone && !targetZone.classList.contains('cleared')) {
                targetZone.classList.add('hint');
            }
        });

        clue.addEventListener('dragend', function(e) {
            setTimeout(() => this.style.opacity = '1', 0);
            draggedItem = null;
            
            // 移除所有提示
            document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('hint'));
        });
    });

    dropZones.forEach(zone => {
        zone.addEventListener('dragover', function(e) {
            e.preventDefault(); // 必须阻止默认行为才能允许 drop
            if(draggedItem && this.getAttribute('data-target') === draggedItem.getAttribute('data-id')) {
                this.classList.add('highlight');
            }
        });

        zone.addEventListener('dragleave', function(e) {
            this.classList.remove('highlight');
        });

        zone.addEventListener('drop', function(e) {
            e.preventDefault();
            this.classList.remove('highlight');
            
            if (draggedItem && this.getAttribute('data-target') === draggedItem.getAttribute('data-id')) {
                // 匹配成功
                matchSuccess(this, draggedItem);
            }
        });
    });

    const narratives = {
        frag1: `Someone always remembers to order a second drink for you.<br>Even when you've already stopped noticing.<br><span style="color:#888; font-size:13px;">— The glass was full. But so was the powder.</span>`,
        frag2: `A perfect photo needs the right moment. And the right unconscious subject.<br>She'd been planning the frame long before she smiled at the camera.<br><span style="color:#888; font-size:13px;">— 1:40 AM. Your alibi. Her setup.</span>`,
        frag3: `Red clay from the north suburbs clings differently than city mud.<br>She'd been somewhere that night that she never mentioned.<br><span style="color:#888; font-size:13px;">— The heels knew where she'd been. You just weren't looking down.</span>`,
        frag4: `VIPER.<br>Not a tattoo. A signature.<br>Something older than last night, and much harder to wash off.<br><span style="color:#888; font-size:13px;">— This isn't just about you. You've stepped into something bigger.</span>`
    };

    function showNarrative(fragId) {
        const box = document.getElementById('clue-narrative');
        box.style.opacity = '0';
        box.innerHTML = narratives[fragId] || '';
        setTimeout(() => { box.style.opacity = '1'; }, 400);
    }

    function startVideoPlayback(fragId) {
        const modal = document.getElementById('video-modal');
        const dialogueBox = document.getElementById('dialogue-box');
        dialogueBox.innerHTML = '<div class="dialogue-line show" style="text-align: center; color: #888; font-style: italic;">(Memory Playback - Video Simulation...)</div>';
        
        showNarrative(fragId);
        modal.classList.add('active');
    }
    function matchSuccess(zone, item) {
        // 更新 UI
        item.classList.add('used');
        item.setAttribute('draggable', 'false');
        
        // 隐藏热区提示圈
        zone.style.display = 'none';

        // 让对应的大区块迷雾消失（变清晰）
        const targetFogId = zone.getAttribute('data-fog');
        const fogSection = document.getElementById(targetFogId);
        if (fogSection) {
            fogSection.classList.add('cleared');
        }

        // 显示对应碎片叙事文案
        const fragId = item.getAttribute('data-id');

        // 播放视频
        startVideoPlayback(fragId);
        
        clearedCount++;
    }

    function advanceDialogue() {
        closeVideoPlayback();
    }

    function closeVideoPlayback() {
        const modal = document.getElementById('video-modal');
        modal.classList.remove('active');

        // 检查是否全清
        if (clearedCount >= totalClues) {
            document.getElementById('continue-story-btn').style.display = 'block';
            document.getElementById('clues-container').style.display = 'none';
        }
    }

    function returnToMainStory() {
        alert("Proceeding to EP03: The Neon Bar...");
        // 实际使用时这里可以 window.location.href = 'EP03.html';
    }

</script>
</body>
</html>
